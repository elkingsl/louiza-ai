<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Louiza AI — Settings</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background-color: var(--md-background);
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background-color: var(--md-surface-container);
      border-bottom: 1px solid var(--md-outline-variant);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-bar-title {
      flex: 1;
      font-size: 1.375rem;
      font-weight: 400;
    }

    .settings-body {
      flex: 1;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 36rem;
      width: 100%;
      margin: 0 auto;
    }

    /* Section card */
    .section-card {
      background-color: var(--md-surface-container-low);
      border-radius: var(--md-shape-xl);
      overflow: hidden;
    }

    .section-header {
      padding: 1rem 1rem 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--md-primary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* List items */
    .list-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--md-outline-variant);
    }

    .list-item:last-child { border-bottom: none; }

    .list-item-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--md-shape-full);
      background-color: var(--md-secondary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-secondary-container);
      flex-shrink: 0;
    }

    .list-item-content {
      flex: 1;
      min-width: 0;
    }

    .list-item-label {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--md-on-surface);
    }

    .list-item-sub {
      font-size: 0.8125rem;
      color: var(--md-on-surface-variant);
      margin-top: 0.125rem;
    }

    /* Inline text input */
    .inline-input {
      width: 100%;
      font-family: var(--md-font);
      font-size: 0.9375rem;
      color: var(--md-on-surface);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--md-outline-variant);
      padding: 0.25rem 0;
      outline: none;
      transition: border-color var(--md-duration-short) var(--md-easing);
    }

    .inline-input:focus {
      border-bottom-color: var(--md-primary);
    }

    .inline-input[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Inline select */
    .inline-select {
      font-family: var(--md-font);
      font-size: 0.875rem;
      color: var(--md-on-surface-variant);
      background: var(--md-surface-container-highest);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-full);
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      max-width: 10rem;
    }

    /* Save button row */
    .save-row {
      display: flex;
      justify-content: flex-end;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--md-outline-variant);
    }

    /* Btn loading state */
    .btn-save .btn-label { display: inline; }
    .btn-save .spinner   { display: none; }
    .btn-save.loading .btn-label { display: none; }
    .btn-save.loading .spinner   { display: inline-block; }

    /* Danger zone */
    .danger-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1rem;
      background: none;
      border: none;
      font-family: var(--md-font);
      font-size: 0.9375rem;
      color: var(--md-error);
      cursor: pointer;
      text-align: left;
      border-bottom: 1px solid var(--md-outline-variant);
    }

    .danger-btn:last-child { border-bottom: none; }
    .danger-btn:hover { background-color: var(--md-error-container); }

    /* Snackbar override — above nav */
    .snackbar { bottom: 1.5rem; }

    /* User info chip at top */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background-color: var(--md-surface-container-low);
      border-radius: var(--md-shape-xl);
    }

    .user-avatar {
      width: 3rem;
      height: 3rem;
      border-radius: var(--md-shape-full);
      background-color: var(--md-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-primary-container);
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .user-info h2 {
      font-size: 1rem;
      font-weight: 500;
    }

    .user-info p {
      font-size: 0.8125rem;
      color: var(--md-on-surface-variant);
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <a href="chat.html" class="btn btn-icon" aria-label="Back">
      <span class="material-icons-round">arrow_back</span>
    </a>
    <span class="top-bar-title">Settings</span>
  </header>

  <main class="settings-body">

    <!-- User chip -->
    <div class="user-chip">
      <div class="user-avatar">
        <span class="material-icons-round">person</span>
      </div>
      <div class="user-info">
        <h2 id="display-username">—</h2>
        <p id="display-email">No email set</p>
      </div>
    </div>

    <!-- Profile section -->
    <div class="section-card">
      <div class="section-header">Profile</div>

      <div class="list-item">
        <div class="list-item-icon">
          <span class="material-icons-round">badge</span>
        </div>
        <div class="list-item-content">
          <div class="list-item-label">Username</div>
          <input class="inline-input" id="field-username" type="text" disabled title="Username cannot be changed" />
        </div>
      </div>

      <div class="list-item">
        <div class="list-item-icon">
          <span class="material-icons-round">mail</span>
        </div>
        <div class="list-item-content">
          <div class="list-item-label">Email</div>
          <input class="inline-input" id="field-email" type="email" placeholder="your@email.com" />
        </div>
      </div>

      <div class="save-row">
        <button class="btn btn-tonal btn-save" id="btn-save-profile" onclick="Settings.saveProfile()">
          <span class="btn-label">Save Profile</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

    <!-- Appearance section -->
    <div class="section-card">
      <div class="section-header">Appearance</div>

      <div class="list-item">
        <div class="list-item-icon">
          <span class="material-icons-round">dark_mode</span>
        </div>
        <div class="list-item-content">
          <div class="list-item-label">Dark Mode</div>
          <div class="list-item-sub">Use dark color scheme</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="switch-dark" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>

      <div class="list-item">
        <div class="list-item-icon">
          <span class="material-icons-round">language</span>
        </div>
        <div class="list-item-content">
          <div class="list-item-label">Language</div>
        </div>
        <select class="inline-select" id="sel-language">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="ar">Arabic</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
        </select>
      </div>

      <div class="save-row">
        <button class="btn btn-tonal btn-save" id="btn-save-settings" onclick="Settings.saveSettings()">
          <span class="btn-label">Save Settings</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

    <!-- Model fixed to Auto, no UI needed -->

    <!-- Danger zone -->
    <div class="section-card">
      <div class="section-header">Account</div>

      <button class="danger-btn" onclick="confirmLogout()">
        <span class="material-icons-round">logout</span>
        Sign Out
      </button>
    </div>

    <p style="text-align:center;font-size:0.75rem;color:var(--md-on-surface-variant);padding-bottom:1rem">
      Louiza AI v1.0.0
    </p>
  </main>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar"></div>

  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/settings.js"></script>
  <script>
    Auth.requireAuth();

    // Init theme
    (async () => {
      try {
        const session = Auth.getSession();
        const s = await DB.getSettings(session.username);
        Theme.init(s?.dark_mode ?? true);
      } catch (_) { Theme.init(); }
    })();

    // Populate model select
    const selModel = document.getElementById("sel-model");
    CONFIG.MODELS.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = m.label;
      selModel.appendChild(opt);
    });

    // Init settings and update user chip
    Settings.init().then(() => {
      const profile = Auth.getSession();
      if (profile) {
        document.getElementById("display-username").textContent = profile.username || "—";
        document.getElementById("display-email").textContent = profile.email || "No email set";
      }
    });

    async function saveModel() {
      const session = Auth.getSession();
      const model = document.getElementById("sel-model").value;
      try {
        document.getElementById("btn-save-model").classList.add("loading");
        document.getElementById("btn-save-model").disabled = true;
        const settings = await DB.getSettings(session.username);
        settings.model = model;
        await DB.saveSettings(session.username, settings);
        showSnackbar("Model saved");
      } catch (e) {
        showSnackbar("Failed: " + e.message, true);
      } finally {
        document.getElementById("btn-save-model").classList.remove("loading");
        document.getElementById("btn-save-model").disabled = false;
      }
    }

    function confirmLogout() {
      if (confirm("Sign out of Louiza AI?")) Auth.logout();
    }

    function showSnackbar(msg, isError = false) {
      const el = document.getElementById("snackbar");
      el.textContent = msg;
      el.style.backgroundColor = isError
        ? "var(--md-error-container)"
        : "";
      el.style.color = isError
        ? "var(--md-on-error-container)"
        : "";
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 3000);
    }
  </script>
</body>
</html>
