<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Louiza AI — Chat</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Top Bar ─────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background-color: var(--md-surface-container);
      flex-shrink: 0;
      border-bottom: 1px solid var(--md-outline-variant);
    }

    .top-bar-logo {
      width: 2rem;
      height: 2rem;
      border-radius: var(--md-shape-sm);
      background-color: var(--md-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-primary-container);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .top-bar-title {
      flex: 1;
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--md-on-surface);
    }

    .model-select {
      font-family: var(--md-font);
      font-size: 0.75rem;
      color: var(--md-on-surface-variant);
      background: var(--md-surface-container-highest);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-full);
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      outline: none;
      max-width: 8rem;
      -webkit-appearance: none;
    }

    /* ── Messages ────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    /* Welcome state */
    .welcome-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-align: center;
      margin: auto;
      padding: 2rem;
      animation: fade-in 0.4s var(--md-easing) both;
    }

    .welcome-icon {
      width: 4rem;
      height: 4rem;
      border-radius: var(--md-shape-xl);
      background-color: var(--md-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-primary-container);
      font-size: 2rem;
    }

    .welcome-msg h2 {
      font-size: 1.375rem;
      font-weight: 400;
      color: var(--md-on-surface);
    }

    .welcome-msg p {
      font-size: 0.875rem;
      color: var(--md-on-surface-variant);
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 85%;
      align-items: flex-start;
    }

    .msg-user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .msg-ai {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 2rem;
      height: 2rem;
      border-radius: var(--md-shape-full);
      background-color: var(--md-surface-container-highest);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-surface-variant);
      flex-shrink: 0;
      font-size: 1rem;
    }

    .msg-ai .msg-avatar {
      background-color: var(--md-primary-container);
      color: var(--md-on-primary-container);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .msg-content {
      padding: 0.75rem 1rem;
      border-radius: var(--md-shape-lg);
      font-size: 0.9375rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-user .msg-content {
      background-color: var(--md-primary);
      color: var(--md-on-primary);
      border-bottom-right-radius: var(--md-shape-xs);
    }

    .msg-ai .msg-content {
      background-color: var(--md-surface-container-high);
      color: var(--md-on-surface);
      border-bottom-left-radius: var(--md-shape-xs);
    }

    .msg-time {
      font-size: 0.6875rem;
      color: var(--md-on-surface-variant);
      padding: 0 0.25rem;
    }

    .msg-user .msg-time { text-align: right; }

    /* Code blocks */
    .msg-content pre {
      background-color: var(--md-surface-container-lowest);
      border-radius: var(--md-shape-sm);
      padding: 0.75rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-family: var(--md-font-mono);
      font-size: 0.8125rem;
    }

    .msg-content code {
      font-family: var(--md-font-mono);
      font-size: 0.875em;
      background-color: var(--md-surface-container-highest);
      padding: 0.125rem 0.375rem;
      border-radius: var(--md-shape-xs);
    }

    .msg-content pre code {
      background: none;
      padding: 0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.875rem 1rem;
      background-color: var(--md-surface-container-high);
      border-radius: var(--md-shape-lg);
      border-bottom-left-radius: var(--md-shape-xs);
    }

    .typing-indicator span {
      width: 0.375rem;
      height: 0.375rem;
      border-radius: 50%;
      background-color: var(--md-on-surface-variant);
      animation: typing-bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-0.375rem); opacity: 1; }
    }

    /* Error message */
    .msg-error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--md-error-container);
      color: var(--md-on-error-container);
      border-radius: var(--md-shape-sm);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      align-self: center;
    }

    /* Message animation */
    .msg-animate {
      animation: msg-in 0.25s var(--md-easing) both;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(0.5rem); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Input Area ───────────────────────────── */
    .input-area {
      padding: 0.75rem 1rem;
      background-color: var(--md-surface-container);
      border-top: 1px solid var(--md-outline-variant);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      background-color: var(--md-surface-container-highest);
      border-radius: var(--md-shape-xl);
      padding: 0.375rem 0.375rem 0.375rem 1rem;
    }

    #chat-input {
      flex: 1;
      font-family: var(--md-font);
      font-size: 1rem;
      color: var(--md-on-surface);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      max-height: 10rem;
      min-height: 1.5rem;
      line-height: 1.5;
      padding: 0.375rem 0;
    }

    #chat-input::placeholder {
      color: var(--md-on-surface-variant);
    }

    #btn-send {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: var(--md-shape-full);
      background-color: var(--md-primary);
      color: var(--md-on-primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition:
        background-color var(--md-duration-short) var(--md-easing),
        transform var(--md-duration-short) var(--md-easing);
    }

    #btn-send:active { transform: scale(0.92); }
    #btn-send:disabled {
      background-color: var(--md-surface-container-highest);
      color: var(--md-on-surface-variant);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-logo">
      <span class="material-icons-round" style="font-size:1rem">auto_awesome</span>
    </div>
    <span class="top-bar-title">Louiza AI</span>
    <select class="model-select" id="model-select" onchange="saveModelPref()" title="Select model">
      <!-- Populated by JS -->
    </select>
    <button class="btn btn-icon" onclick="Theme.toggle()" aria-label="Toggle theme" title="Toggle theme">
      <span class="material-icons-round" id="theme-icon">light_mode</span>
    </button>
    <button class="btn btn-icon" onclick="confirmClear()" aria-label="Clear chat" title="Clear chat" id="btn-clear" style="display:none">
      <span class="material-icons-round">delete_outline</span>
    </button>
    <a href="settings.html" class="btn btn-icon" aria-label="Settings" title="Settings">
      <span class="material-icons-round">settings</span>
    </a>
  </header>

  <!-- Messages -->
  <main id="messages"></main>

  <!-- Input -->
  <footer class="input-area">
    <div class="input-row">
      <textarea
        id="chat-input"
        placeholder="Message Louiza…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="Chat.autoResize(this)"
      ></textarea>
      <button id="btn-send" onclick="Chat.send()" aria-label="Send">
        <span class="material-icons-round">send</span>
      </button>
    </div>
  </footer>

  <!-- Clear confirm dialog -->
  <div class="dialog-scrim" id="clear-dialog" onclick="closeClearDialog(event)">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <h2 class="dialog-title" id="dialog-title">Clear chat?</h2>
      <p style="font-size:0.875rem;color:var(--md-on-surface-variant)">
        This will delete your entire chat history. This action cannot be undone.
      </p>
      <div class="dialog-actions">
        <button class="btn btn-text" onclick="closeClearDialog()">Cancel</button>
        <button class="btn btn-filled" style="background:var(--md-error);color:var(--md-on-error)" onclick="doClear()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar"></div>

  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/chat.js"></script>
  <script>
    Auth.requireAuth();

    // Enable input immediately — never block on async
    document.getElementById("chat-input").disabled = false;
    document.getElementById("btn-send").disabled = false;

    // Theme — non-blocking
    Theme.init();
    (async () => {
      try {
        const session = Auth.getSession();
        const settings = await DB.getSettings(session.username);
        Theme.init(settings?.dark_mode ?? true);
      } catch (_) {}
      syncThemeIcon();
    })();

    function syncThemeIcon() {
      document.getElementById("theme-icon").textContent = Theme.isDark() ? "light_mode" : "dark_mode";
    }

    const origToggle = Theme.toggle.bind(Theme);
    Theme.toggle = async () => { await origToggle(); syncThemeIcon(); };

    // Populate model select
    const sel = document.getElementById("model-select");
    CONFIG.MODELS.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = m.label;
      sel.appendChild(opt);
    });

    // Save model preference
    async function saveModelPref() {
      const session = Auth.getSession();
      try {
        const settings = await DB.getSettings(session.username);
        settings.model = sel.value;
        await DB.saveSettings(session.username, settings);
      } catch (_) {}
    }

    // Init chat — fire and forget, never blocks input
    Chat.renderWelcome();
    Chat.init();

    // Enter to send (Shift+Enter for newline)
    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        Chat.send();
      }
    }

    // Clear dialog
    function confirmClear() {
      document.getElementById("clear-dialog").classList.add("open");
    }
    function closeClearDialog(e) {
      if (!e || e.target === document.getElementById("clear-dialog")) {
        document.getElementById("clear-dialog").classList.remove("open");
      }
    }
    async function doClear() {
      closeClearDialog();
      await Chat.clearHistory();
      showSnackbar("Chat cleared");
    }

    // Snackbar
    function showSnackbar(msg, duration = 3000) {
      const el = document.getElementById("snackbar");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), duration);
    }
  </script>
</body>
</html>
